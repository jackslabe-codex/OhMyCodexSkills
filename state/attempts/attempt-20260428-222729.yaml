      "correct_answer": "B",
      "stem_text": "下面函数用“哑结点”统一处理删除单向链表中的头结点与中间结点。横线处应填（ ）。\n\n```cpp\nstruct Node{\n    int val;\n    Node* next;\n    Node(int v):val(v),next(nullptr){}\n};\n\nNode* eraseAll(Node* head, int x){\n    Node dummy(0);\n    dummy.next = head;\n    Node* cur = &dummy;\n    while(cur->next){\n        if(cur->next->val == x){\n            Node* del = cur->next;\n            ______________________\n            delete del;\n        }else cur = cur->next;\n    }\n    return dummy.next;\n}\n```\n\nA. `cur = cur->next;`\nB. `cur->next = del->next;`\nC. `del->next = cur->next;`\nD. `cur->next = nullptr;`"
