      "question_type": "single_choice",
      "correct_answer": "C",
      "stem_text": "双向循环链表中要在结点 p 之前插入新结点 s（均非空），以下指针操作正确的是（ ）。\n\nA.\n```cpp\ns -> next = p;\np -> prev = s;\np -> next = s;\ns -> prev = p;\n```\n\nB.\n```cpp\ns -> prev = p;\ns -> next = p -> next;\np -> next -> prev = s;\np -> next = s;\n```\n\nC.\n```cpp\ns -> next = p;\ns -> prev = p->prev;\np -> prev -> next = s;\np -> prev = s;\n```\n\nD.\n```cpp\ns -> next = p;\ns -> prev = nullptr;\np -> prev = s;\n```"
