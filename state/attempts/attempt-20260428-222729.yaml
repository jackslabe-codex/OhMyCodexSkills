      "stem_text": "关于单链表、双链表和循环链表，下列说法正确的是（ ）。\n\nA. 在单链表中，若已知任意结点的指针，则可以在 $O(1)$ 时间内删除该结点。\n\nB. 循环链表中一定不存在空指针。\n\nC. 在循环双链表中，尾结点的 next 指针一定为 nullptr。\n\nD. 在带头结点的循环单链表中，判定链表是否为空只需判断头结点的 next 是否指向自身。"
