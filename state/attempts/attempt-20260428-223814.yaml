      "stem_text": "下面关于单链表和双链表的描述中，正确的是（ ）。\n\n```cpp\nstruct DNode {\n    int data;\n    DNode* prev;\n    DNode* next;\n};\n\n// 在双链表中删除指定节点\nvoid deleteNode(DNode* node) {\n    if (node->prev) {\n        node->prev->next = node->next;\n    }\n    if (node->next) {\n        node->next->prev = node->prev;\n    }\n    delete node;\n}\n\nstruct SNode {\n    int data;\n    SNode* next;\n};\n\n// 在单链表中删除指定节点\nvoid deleteSNode(SNode* head, SNode* node) {\n    SNode* prev = head;\n    while (prev->next != node) {\n        prev = prev->next;\n    }\n    prev->next = node->next;\n    delete node;\n}\n```\n\nA. 双链表删除指定节点是O(1)，单链表是O(1)\nB. 双链表删除指定节点是O(n)，单链表是O(1)\nC. 双链表删除指定节点是O(1)，单链表是O(n)\nD. 双链表删除指定节点是O(n)，单链表是O(n)"
