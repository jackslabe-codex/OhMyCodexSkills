      "stem_text": "区块链技术是比特币的基础。在区块链中，每个区块指向前一个区块，构成链式列表，新区块只能接在链尾，不允许在中间插入或删除。下面代码实现插入区块添加函数，则横线处填写（ ）。\n\n```cpp\n//区块（节点）\nstruct Block {\n    int index;            // 区块编号（高度）\n    string data;          // 区块里保存的数据\n    Block* prev;          // 指向前一个区块\n    Block(int idx, const string& d, Block* p) : index(idx), data(d), prev(p) {}\n};\n\n// 区块链\nstruct Blockchain {\n    Block* tail;\n    // 初始化\n    void init() {\n        tail = new Block(0, \"Genesis Block\", nullptr);\n    }\n    // 插入新区块\n    void addBlock(const string& data) {\n        _______________________     //在此处填入代码\n    }\n    // 释放内存\n    void clear() {\n        Block* cur = tail;\n        while (cur != nullptr) {\n            Block* p = cur->prev;\n            delete cur;\n            cur = p;\n        }\n        tail = nullptr;\n    }\n};\n```\n\nA.\n```cpp\nBlock* newBlock = new Block(tail->index + 1, data, tail);\ntail = newBlock->prev;\n```\n\nB.\n```cpp\nBlock* newBlock = new Block(tail->index + 1, data, tail);\ntail = newBlock;\n```\n\nC.\n```cpp\nBlock* newBlock = new Block(tail->index + 1, data, tail->prev);\ntail = newBlock;\n```\n\nD.\n```cpp\nBlock* newBlock = new Block(tail->index + 1, data, tail->prev);\ntail = newBlock->prev;\n```"
