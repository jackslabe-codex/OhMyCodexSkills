      "stem_text": "给定有 n 个任务，每个任务有截止时间和利润，每个任务耗时 1 个时间单位、必须在截止时间前完成，且每个时间槽最多做 1 个任务。为了在规定时间内获得最大利润，可以采用贪心策略，即按利润从高到低排序，尽量安排，则横线处应填写（ ）。\n\n```cpp\nstruct Task {\n    int deadline;    //截止时间\n    int profit;      //利润\n};\n\nvoid sortByProfit(vector<Task>& tasks) {\n    sort(tasks.begin(), tasks.end(),\n         [](const Task& a, const Task& b) {\n             return a.profit > b.profit;\n         });\n}\n\nint maxProfit(vector<Task>& tasks) {\n    sortByProfit(tasks);\n\n    int maxTime = 0;\n    for (auto& t : tasks) {\n        maxTime = max(maxTime, t.deadline);\n    }\n\n    vector<bool> slot(maxTime + 1, false);\n    int totalProfit = 0;\n\n    for (auto& task : tasks) {\n        for (int t = task.deadline; t >= 1; t--) {\n            if (!slot[t]) {\n                _______________________ //在此处填入代码\n                break;\n            }\n        }\n    }\n\n    return totalProfit;\n}\n```\n\nA.\n```cpp\nslot[t] = true;\ntotalProfit += task.profit;\n```\n\nB.\n```cpp\nslot[t] = false;\ntotalProfit += task.profit;\n```\n\nC.\n```cpp\nslot[t] = true;\ntotalProfit = task.profit;\n```\n\nD.\n```cpp\nslot[t] = false;\ntotalProfit = task.profit;\n```"
