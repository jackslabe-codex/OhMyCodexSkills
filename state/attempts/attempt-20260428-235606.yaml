      "stem_text": "下面代码尝试在有序数组中查找第一个大于等于 x 的元素位置。如果没有大于等于 x 的元素，返回 `arr.size()`。以下说法正确的是（ ）。\n\n```cpp\nint lower_bound(vector<int>& arr, int x) {\n    int l = 0, r = arr.size();\n    while(l < r) {\n        int mid = l + (r - l) / 2;\n        if(arr[mid] >= x) r = mid;\n        else l = mid + 1;\n    }\n    return l;\n}\n```\n\nA. 上述代码逻辑正确\nB. 上述代码逻辑错误，while 循环条件应该用 l <= r\nC. 上述代码逻辑错误，mid 计算错误\nD. 上述代码逻辑错误，边界条件不对"
