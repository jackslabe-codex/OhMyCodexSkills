      "stem_text": "小杨要把一根长度为 L 的木头切成 K 段，使得每段长度小于等于 x。已知每切一刀只能把一段木头分成两段，他用二分法找到满足条件的最小 x（x 为正整数），则横线处应填写（ ）。\n\n```cpp\n// 判断：在不超过 K 次切割内，是否能让每段长度 <= x\nbool check(int L, int K, int x) {\n    int cuts = (L - 1) / x;\n    return cuts <= K;\n}\n\n// 二分查找最小可行的 x\nint binary_cut(int L, int K) {\n    int l = 1, r = L;\n    while (l < r) {\n        int mid = l + (r - l) / 2;\n        ________________________________     // 在此处填入代码\n    }\n    return l;\n}\n\nint main() {\n    int L = 10;   // 木头长度\n    int K = 2;    // 最多切 K 刀\n    cout << binary_cut(L, K) << endl;\n    return 0;\n}\n```\n\nA.\n```cpp\nif (check(L, K, mid))\n    r = mid;\nelse\n    l = mid + 1;\n```\n\nB.\n```cpp\nif (check(L, K, mid))\n    r = mid+1;\nelse\n    l = mid + 1;\n```\n\nC.\n```cpp\nif (check(L, K, mid))\n    r = mid + 1;\nelse\n    l = mid - 1;\n```\n\nD.\n```cpp\nif (check(L, K, mid))\n    r = mid + 1;\nelse\n    l = mid;\n```"
